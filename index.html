<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>TIGER GOLD • Хищный SWAG</title>
    <style>
        /* ===== СБРОС ВСЕГО И ФИКС СКРОЛЛА ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            overflow-x: hidden;
            width: 100%;
        }

        body {
            background-color: #0a0704;
            background-image: 
                repeating-linear-gradient(
                    45deg,
                    rgba(180, 120, 30, 0.08) 0px,
                    rgba(180, 120, 30, 0.08) 2px,
                    transparent 2px,
                    transparent 8px
                ),
                repeating-linear-gradient(
                    -45deg,
                    rgba(0, 0, 0, 0.15) 0px,
                    rgba(0, 0, 0, 0.15) 3px,
                    transparent 3px,
                    transparent 12px
                ),
                repeating-linear-gradient(
                    90deg,
                    rgba(200, 140, 40, 0.05) 0px,
                    rgba(200, 140, 40, 0.05) 1px,
                    transparent 1px,
                    transparent 20px
                ),
                repeating-linear-gradient(
                    0deg,
                    rgba(160, 100, 20, 0.06) 0px,
                    rgba(160, 100, 20, 0.06) 1px,
                    transparent 1px,
                    transparent 15px
                ),
                radial-gradient(circle at 20% 30%, #3d2b0e 0%, transparent 30%),
                radial-gradient(circle at 80% 70%, #2a1c06 0%, transparent 40%),
                linear-gradient(145deg, #0e0a04 0%, #1a1206 100%);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 1.5rem;
            color: #f5e7c8;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            position: relative;
            overflow-x: hidden;
            width: 100%;
            margin: 0;
        }

        /* Тигриные полосы поверх фона */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                repeating-linear-gradient(
                    135deg,
                    transparent 0px,
                    transparent 30px,
                    rgba(0, 0, 0, 0.12) 30px,
                    rgba(0, 0, 0, 0.12) 35px,
                    transparent 35px,
                    transparent 65px,
                    rgba(0, 0, 0, 0.08) 65px,
                    rgba(0, 0, 0, 0.08) 70px,
                    transparent 70px,
                    transparent 100px
                ),
                repeating-linear-gradient(
                    45deg,
                    transparent 0px,
                    transparent 50px,
                    rgba(20, 10, 0, 0.1) 50px,
                    rgba(20, 10, 0, 0.1) 55px,
                    transparent 55px,
                    transparent 105px,
                    rgba(20, 10, 0, 0.06) 105px,
                    rgba(20, 10, 0, 0.06) 110px,
                    transparent 110px,
                    transparent 160px
                ),
                radial-gradient(circle at 30% 40%, rgba(212, 175, 55, 0.06) 0%, transparent 50%),
                radial-gradient(circle at 70% 60%, rgba(255, 180, 40, 0.04) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        /* Золотая пыльца поверх тигриной текстуры */
        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(212, 175, 55, 0.1) 0%, transparent 25%),
                radial-gradient(circle at 90% 80%, rgba(255, 215, 0, 0.06) 0%, transparent 30%),
                radial-gradient(circle at 40% 50%, rgba(218, 165, 32, 0.05) 0%, transparent 40%);
            pointer-events: none;
            z-index: 0;
        }

        /* ===== ЗОЛОТАЯ КАРТА С ТИГРИНЫМ АКЦЕНТОМ ===== */
        .gold-card {
            max-width: 820px;
            width: 100%;
            margin: 0 auto;
            background: rgba(8, 5, 2, 0.88);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 2px solid;
            border-image: linear-gradient(135deg, #d4af37, #b8860b, #8b6914) 1;
            border-radius: 3rem;
            padding: 2.8rem;
            box-shadow: 
                0 30px 50px -10px rgba(0, 0, 0, 0.9),
                0 0 0 1.5px rgba(212, 175, 55, 0.2) inset,
                0 0 40px rgba(212, 175, 55, 0.12),
                0 0 0 2px rgba(139, 105, 20, 0.1) inset;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            z-index: 2;
        }

        /* Тигриная окантовка карточки */
        .gold-card::before {
            content: "";
            position: absolute;
            top: -3px;
            left: -3px;
            right: -3px;
            bottom: -3px;
            border-radius: 3.2rem;
            padding: 3px;
            background: repeating-linear-gradient(
                45deg,
                transparent,
                transparent 15px,
                rgba(212, 175, 55, 0.08) 15px,
                rgba(212, 175, 55, 0.08) 18px
            );
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
            z-index: 1;
        }

        .gold-card:hover {
            border-color: rgba(255, 215, 0, 0.6);
            box-shadow: 
                0 35px 60px -12px #000000,
                0 0 0 2px rgba(255, 215, 0, 0.25) inset,
                0 0 60px rgba(255, 215, 0, 0.2);
            transform: translateY(-5px);
        }

        /* ===== ЗОЛОТАЯ ТИПОГРАФИКА С ТИГРИНЫМ ШАРМОМ ===== */
        .gold-badge {
            display: inline-block;
            background: linear-gradient(135deg, #2a1c06 0%, #1a1004 100%);
            padding: 0.4rem 1.4rem;
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #d4af37;
            border: 1.5px solid #b49450;
            margin-bottom: 2rem;
            backdrop-filter: blur(4px);
            box-shadow: 0 2px 8px #00000040, 0 0 15px #ffd7001a, inset 0 0 8px #ffd7001a;
            text-shadow: 0 0 5px #ffd70040;
        }

        h1 {
            font-size: 3.8rem;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #f9e076 0%, #e4b124 40%, #c59b27 70%, #f5d56e 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.02em;
            text-shadow: 0 2px 20px #ffd70030, 0 0 5px #ff8c00;
            animation: goldShine 6s ease infinite;
            word-break: break-word;
        }

        @keyframes goldShine {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .gold-subhead {
            color: #cfb87c;
            font-weight: 600;
            font-size: 1.3rem;
            margin-bottom: 1.5rem;
            border-left: 5px solid #d4af37;
            padding-left: 1.5rem;
            text-shadow: 0 0 12px #b8860b40, 0 0 3px #ffd700;
            position: relative;
        }

        /* Тигриная полоска под заголовком */
        .gold-subhead::after {
            content: "";
            position: absolute;
            bottom: -8px;
            left: 0;
            width: 60px;
            height: 2px;
            background: repeating-linear-gradient(
                90deg,
                #d4af37 0px,
                #d4af37 6px,
                transparent 6px,
                transparent 12px
            );
        }

        p {
            color: #dac29c;
            font-size: 1.08rem;
            margin-bottom: 2rem;
            max-width: 100%;
            text-shadow: 0 1px 2px black;
            word-wrap: break-word;
        }

        /* ===== ЗОЛОТЫЕ СТАТЫ С ТИГРИНЫМ УЗОРОМ ===== */
        .gold-stats {
            display: flex;
            gap: 1.5rem;
            margin: 2.5rem 0 2.2rem;
            flex-wrap: wrap;
        }

        .stat-gold {
            background: linear-gradient(145deg, #1f1608, #100c04);
            padding: 1rem 2rem;
            border-radius: 60px;
            border: 1.5px solid #b4945040;
            box-shadow: 0 8px 12px #00000050, inset 0 1px 0 #ffe28b20;
            backdrop-filter: blur(4px);
            position: relative;
            overflow: hidden;
        }

        /* Тигриные полоски на статах */
        .stat-gold::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-linear-gradient(
                45deg,
                transparent,
                transparent 8px,
                rgba(212, 175, 55, 0.05) 8px,
                rgba(212, 175, 55, 0.05) 10px
            );
            pointer-events: none;
        }

        .stat-number {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(180deg, #ffecb3 0%, #d4af37 80%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: block;
            line-height: 1.1;
            letter-spacing: -0.01em;
            position: relative;
            z-index: 1;
        }

        .stat-label {
            font-size: 0.75rem;
            color: #bd9f5a;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
            position: relative;
            z-index: 1;
        }

        /* ===== ЗОЛОТЫЕ КНОПКИ ===== */
        .gold-buttons {
            display: flex;
            gap: 1.2rem;
            flex-wrap: wrap;
            margin: 1.5rem 0 1.2rem;
        }

        .btn-gold {
            padding: 1rem 2.4rem;
            border-radius: 60px;
            font-weight: 700;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 0.25s ease;
            font-size: 1rem;
            border: 1.5px solid transparent;
            cursor: pointer;
            letter-spacing: 0.3px;
            backdrop-filter: blur(4px);
        }

        .btn-primary-gold {
            background: linear-gradient(145deg, #e9c468 0%, #bf9530 100%);
            color: #0a0702;
            box-shadow: 0 10px 25px #00000060, 0 0 20px #ffd70040;
            border-color: #ffe28b;
            text-shadow: 0 1px 0 #fff3cf;
            font-weight: 800;
            position: relative;
            overflow: hidden;
        }

        .btn-primary-gold::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-linear-gradient(
                90deg,
                transparent,
                transparent 10px,
                rgba(255, 255, 255, 0.08) 10px,
                rgba(255, 255, 255, 0.08) 12px
            );
            pointer-events: none;
        }

        .btn-primary-gold:hover {
            background: linear-gradient(145deg, #f7da7a 0%, #dbb444 100%);
            transform: scale(1.03);
            box-shadow: 0 15px 30px #00000080, 0 0 30px #ffd90060;
            border-color: #ffea9e;
        }

        .btn-outline-gold {
            background: transparent;
            border: 1.8px solid #b49450;
            color: #efdbaf;
            box-shadow: 0 4px 12px #00000030;
        }

        .btn-outline-gold:hover {
            background: #2f2008;
            border-color: #ecc454;
            color: #ffffff;
            box-shadow: 0 8px 18px #00000060, 0 0 12px #ffd70030;
        }

        /* ===== ЗОЛОТЫЕ СОЦСЕТИ ===== */
        .gold-social {
            display: flex;
            gap: 1.8rem;
            margin-top: 2.2rem;
            padding-top: 1.5rem;
            border-top: 1px dashed #b4945060;
            flex-wrap: wrap;
        }

        .gold-social-link {
            color: #c2a765;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1rem;
        }

        .gold-social-link:hover {
            color: #f5d98c;
            text-shadow: 0 0 12px gold;
        }

        /* Футер */
        .gold-footer {
            margin-top: 1.8rem;
            font-size: 0.8rem;
            color: #8a7b54;
            text-align: right;
            letter-spacing: 1px;
            position: relative;
        }

        /* Тигриная лапка в футере */
        .gold-footer::before {
            content: "🐅";
            margin-right: 5px;
            font-size: 0.9rem;
            opacity: 0.7;
        }

        /* Адаптив */
        @media (max-width: 600px) {
            body {
                padding: 1rem;
            }
            
            .gold-card {
                padding: 1.5rem;
                border-radius: 2rem;
                margin: 0 auto;
            }
            
            h1 {
                font-size: 2.5rem;
            }
            
            p {
                max-width: 100%;
            }
            
            .stat-gold {
                padding: 0.7rem 1.5rem;
            }
            
            .btn-gold {
                padding: 0.9rem 1.8rem;
            }
            
            .gold-buttons {
